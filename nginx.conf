# Configuracion de nginx para servir la aplicacion Angular compilada.
# try_files entrega el archivo prerenderizado si existe y, si no,
# cae en index.html para que el router de Angular resuelva la ruta (SPA).
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Redirecciones relativas: sin esto, el 301 hacia rutas prerenderizadas
    # (ej. /admin -> /admin/) apuntaria al puerto interno 80 en vez del publicado
    absolute_redirect off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy hacia el backend json-server: el navegador llama a /api/... en el
    # mismo dominio del sitio y nginx reenvia al contenedor "api" de docker-compose.
    # Asi el frontend funciona igual en local y en cloud, sin URLs absolutas.
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
